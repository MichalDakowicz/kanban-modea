<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #161616;
    --card:     #1c1c1c;
    --border:   #272727;
    --border-h: #3a3a3a;
    --text:     #e8e8e8;
    --muted:    #555;
    --hint:     #3a3a3a;
    --accent:   #c8f542;
    --accent-d: #a8d42a;
    --blue:     #378ADD;
    --green:    #1d9e75;
    --orange:   #d99a2b;
    --r:        8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 16px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: .08em;
    margin-right: 24px;
    white-space: nowrap;
  }

  .tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
  .tab {
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, background .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text); background: #222; }
  .tab.active { background: #252525; color: var(--text); font-weight: 500; }
  .tab-add {
    color: var(--muted);
    font-size: 18px;
    padding: 4px 10px;
    line-height: 1;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: 16px;
    flex-shrink: 0;
  }

  .audience-filters {
    display: flex;
    gap: 6px;
    max-width: 380px;
    overflow-x: auto;
    padding-bottom: 1px;
  }
  .audience-filters::-webkit-scrollbar { height: 2px; }
  .audience-filters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .aud-chip {
    border: 1px solid var(--border-h);
    background: transparent;
    color: var(--muted);
    border-radius: 999px;
    padding: 3px 9px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, background .15s, border-color .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .aud-chip:hover { color: var(--text); background: #212121; }
  .aud-chip.active {
    color: #0f0f0f;
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-count { font-size: 12px; color: var(--muted); }
  .btn-new {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border-h);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s;
  }
  .btn-new:hover { background: #222; }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #222;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px 4px 4px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .user-pill:hover { border-color: var(--border-h); }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; flex-shrink: 0;
  }

  /* WORKSPACE */
  .workspace {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 14px;
    padding: 16px;
    overflow: hidden;
  }

  /* BOARD */
  .board-wrap {
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .col {
    min-width: 230px;
    width: 230px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: 100%;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 4px 8px;
  }
  .col-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .col-count {
    font-size: 11px;
    color: var(--muted);
    background: #222;
    border-radius: 10px;
    padding: 1px 7px;
  }

  .col-cards {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding: 6px 4px;
    padding-right: 2px;
    border-radius: var(--r);
    transition: background .15s, box-shadow .15s, border-color .15s;
    position: relative;
    border: 1px dashed transparent;
    min-height: 72px;
  }
  .col-cards.drag-over {
    background: rgba(200, 245, 66, .08);
    border-color: rgba(200, 245, 66, .45);
    box-shadow: inset 0 0 0 1px rgba(200, 245, 66, .2);
  }
  .col-cards.drag-over::after {
    content: '';
    position: absolute;
    left: 6px;
    right: 6px;
    bottom: 6px;
    border-bottom: 2px dashed rgba(200, 245, 66, .65);
    pointer-events: none;
  }
  .col-cards::-webkit-scrollbar { width: 3px; }
  .col-cards::-webkit-scrollbar-track { background: transparent; }
  .col-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 11px 13px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
    position: relative;
  }
  .card:hover { border-color: var(--border-h); transform: translateY(-1px); }
  .card.selected {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .card.in-progress { border-left: 2.5px solid var(--blue); border-radius: 0 var(--r) var(--r) 0; }
  .card.done { opacity: .5; }
  .card.card-dragging {
    opacity: .45;
    transform: scale(.98) rotate(-0.3deg);
    cursor: grabbing;
    box-shadow: 0 8px 22px rgba(0, 0, 0, .35);
  }
  .card.card-chosen {
    border-color: rgba(200, 245, 66, .6);
    box-shadow: inset 0 0 0 1px rgba(200, 245, 66, .45);
  }
  .card.card-ghost {
    opacity: .25;
  }

  .card-title {
    font-size: 13px;
    line-height: 1.45;
    margin-bottom: 8px;
    color: var(--text);
  }
  .card.done .card-title { text-decoration: line-through; color: var(--muted); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }
  .p-wysoki  { background: #faece7; color: #993c1d; }
  .p-sredni  { background: #faeeda; color: #854f0b; }
  .p-niski   { background: #eaf3de; color: #3b6d11; }

  .tag-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: #202020;
    color: #bbbbbb;
    border: 1px solid #2d2d2d;
  }

  .av-sm {
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 9px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .checklist-stats {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cl-stat {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .cl-stat.todo {
    color: #9a9a9a;
    border-color: #3a3a3a;
    background: #1d1d1d;
  }
  .cl-stat.doing {
    color: #e4b861;
    border-color: #7a5a22;
    background: #2b2213;
  }
  .cl-stat.done {
    color: #9be2cf;
    border-color: #2f7d67;
    background: #17251f;
  }

  .add-card {
    font-size: 12px;
    color: var(--muted);
    padding: 8px 10px;
    border: 1px dashed var(--border);
    border-radius: var(--r);
    cursor: pointer;
    text-align: center;
    background: transparent;
    transition: color .15s, border-color .15s;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }
  .add-card:hover { color: var(--text); border-color: var(--border-h); }

  /* TASK SIDEBAR */
  .task-sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  .sidebar-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .sidebar-content {
    display: none;
    flex: 1;
    min-height: 0;
    padding: 14px 16px 16px;
    overflow-y: auto;
  }

  .sidebar-content.open { display: block; }

  .task-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .task-top-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }

  .btn-close-task {
    border: 1px solid var(--border-h);
    background: transparent;
    color: var(--muted);
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
  }
  .btn-close-task:hover { color: var(--text); background: #212121; }

  [contenteditable] { outline: none; }

  .task-title {
    font-size: 19px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    border-bottom: 1.5px solid transparent;
    padding-bottom: 4px;
    margin-bottom: 14px;
    min-height: 30px;
    transition: border-color .15s;
  }
  .task-title:hover { border-bottom-color: var(--border-h); }
  .task-title:focus { border-bottom-color: var(--accent); }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .task-desc {
    font-size: 14px;
    color: #aaa;
    line-height: 1.65;
    border: 1px solid transparent;
    border-radius: var(--r);
    padding: 9px 10px;
    min-height: 70px;
    transition: border-color .15s, background .15s;
    white-space: pre-wrap;
  }
  .task-desc:hover,
  .task-desc:focus {
    border-color: var(--border-h);
    background: #1a1a1a;
  }
  .task-desc:empty::before {
    content: attr(data-placeholder);
    color: var(--muted);
    pointer-events: none;
  }

  .task-desc-preview {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text);
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px;
    line-height: 1.6;
    white-space: normal;
    word-break: break-word;
  }
  .task-desc-preview:empty::before {
    content: 'Podgląd markdown pojawi się tutaj';
    color: var(--muted);
  }
  .task-desc-preview h1,
  .task-desc-preview h2,
  .task-desc-preview h3,
  .task-desc-preview h4 {
    margin: 10px 0 6px;
    line-height: 1.35;
  }
  .task-desc-preview h1 { font-size: 18px; }
  .task-desc-preview h2 { font-size: 16px; }
  .task-desc-preview h3 { font-size: 14px; }
  .task-desc-preview h4 { font-size: 13px; }
  .task-desc-preview p { margin: 0 0 8px; }
  .task-desc-preview ul,
  .task-desc-preview ol {
    margin: 0 0 8px 18px;
  }
  .task-desc-preview li { margin: 2px 0; }
  .task-desc-preview blockquote {
    margin: 0 0 8px;
    padding-left: 10px;
    border-left: 2px solid var(--border-h);
    color: #bcbcbc;
  }
  .task-desc-preview pre {
    margin: 0 0 8px;
    padding: 8px;
    background: #101010;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow-x: auto;
  }
  .task-desc-preview code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 4px;
  }
  .task-desc-preview pre code {
    background: transparent;
    border: none;
    padding: 0;
  }
  .task-desc-preview a {
    color: var(--blue);
    text-decoration: none;
  }
  .task-desc-preview a:hover { text-decoration: underline; }

  .meta-grid {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .meta-block { display: flex; flex-direction: column; gap: 5px; }
  .meta-key {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag-pill {
    border: 1px solid var(--border-h);
    background: transparent;
    color: var(--muted);
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 12px;
    cursor: pointer;
    transition: color .15s, background .15s, border-color .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .tag-pill:hover { color: var(--text); background: #212121; }
  .tag-pill.selected {
    background: rgba(200, 245, 66, .1);
    border-color: var(--accent);
    color: var(--accent);
  }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color .15s;
    width: 100%;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='7' viewBox='0 0 12 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px;
  }
  select:hover, select:focus { border-color: var(--border-h); }

  .assignees-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .av-member {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: transform .15s;
  }
  .av-member:hover { transform: scale(1.1); }
  .av-member.selected::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 2px solid var(--accent);
  }
  .av-member.unselected { opacity: .3; }

  .progress-wrap { margin-top: 10px; margin-bottom: 8px; }
  .progress-text { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: width .3s;
  }

  .checklist { display: flex; flex-direction: column; gap: 0; }
  .cl-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .cl-item:first-child { border-top: 1px solid var(--border); }

  .cl-check {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1px solid var(--border-h);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
    background: transparent;
    padding: 0;
    outline: none;
  }
  .cl-check:focus-visible { box-shadow: 0 0 0 2px rgba(200, 245, 66, .35); }
  .cl-check.done { background: var(--green); border-color: var(--green); }
  .cl-check.doing { background: var(--orange); border-color: var(--orange); }
  .cl-check.doing::after {
    content: '';
    width: 7px;
    border-top: 1.5px solid #fff;
  }
  .cl-check.done::after {
    content: '';
    width: 6px; height: 4px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }

  .cl-text-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    padding: 0;
  }
  .cl-text-input.doing { color: #d6c6a3; }
  .cl-text-input.done { text-decoration: line-through; color: var(--muted); }

  .cl-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
    opacity: 0;
    transition: opacity .15s, color .15s;
  }
  .cl-item:hover .cl-delete { opacity: 1; }
  .cl-delete:hover { color: #ff5555; }

  .btn-add-cl {
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 0;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    transition: color .15s;
  }
  .btn-add-cl:hover { color: var(--text); }

  .stack-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .comment-item,
  .issue-item {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 9px 10px;
  }

  .comment-head,
  .issue-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .comment-author,
  .issue-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #cfcfcf;
  }

  .comment-avatar {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .comment-time,
  .issue-time {
    font-size: 11px;
    color: var(--muted);
  }

  .comment-text,
  .issue-text {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .issue-status {
    font-size: 10px;
    border-radius: 999px;
    padding: 2px 8px;
    border: 1px solid transparent;
  }
  .issue-status.open {
    color: #f1b05f;
    border-color: #7a5a22;
    background: #2b2213;
  }
  .issue-status.resolved {
    color: #9be2cf;
    border-color: #2f7d67;
    background: #17251f;
  }

  .inline-input-row {
    margin-top: 8px;
    display: flex;
    gap: 8px;
  }

  .inline-input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .15s;
  }
  .inline-input:focus { border-color: var(--border-h); }

  .btn-inline-add,
  .btn-inline-ghost {
    background: transparent;
    border: 1px solid var(--border-h);
    border-radius: var(--r);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    cursor: pointer;
    transition: color .15s, background .15s;
  }
  .btn-inline-add:hover,
  .btn-inline-ghost:hover {
    color: var(--text);
    background: #212121;
  }

  .btn-inline-danger {
    background: transparent;
    border: 1px solid #ff555544;
    border-radius: var(--r);
    color: #ff7a7a;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 9px;
    cursor: pointer;
    transition: background .15s;

    border: 1px solid #ff555533;

    padding: 8px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s;
    width: 100%;
    margin-top: 10px;
  }
  .btn-delete:hover { background: #ff555511; }

  /* MODAL — new section */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {

    min-width: 320px;

  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-h);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;

  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 16px; border-radius: var(--r);
    border: 1px solid var(--border-h); background: transparent;
    color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px;
  }
  .btn-accent {
    padding: 8px 16px; border-radius: var(--r);
    border: none; background: var(--accent); color: #0f0f0f;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
  }
  .btn-accent:hover { background: var(--accent-d); }

  /* LOADING */
  .loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--muted);
    z-index: 200;
    transition: opacity .3s;
  }
  .loading.hide { opacity: 0; pointer-events: none; }

  @media (max-width: 1120px) {
    body { height: auto; min-height: 100vh; overflow: auto; }
    .workspace {
      flex-direction: column;
      overflow: visible;
    }
    .board-wrap {
      min-height: 55vh;
      overflow-y: auto;
      padding-bottom: 6px;
    }
    .task-sidebar {
      width: 100%;
      min-height: 380px;
    }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

const user = JSON.parse(localStorage.getItem('kb_user'));
if (!user) window.location.href = 'index.html';

document.getElementById('user-av').style.cssText   = `background:${user.color}22;color:${user.color}`;
document.getElementById('user-av').textContent      = user.initials;
document.getElementById('user-name').textContent    = user.name;
document.getElementById('user-pill').addEventListener('click', () => {
  localStorage.removeItem('kb_user');
  window.location.href = 'index.html';
});

let activeSection = null;
let sections      = [];
let allTasks      = {};
let selectedTaskId = null;
let commentDraft = '';
let issueDraft = '';
let boardSortables = [];
let saveTimer = null;
const FALLBACK_PAGE_TYPE = ['Uczeń', 'Nauczyciel', 'Rodzic', 'Administracja'];
const PAGE_TYPE = Array.isArray(window.PAGE_TYPE) && window.PAGE_TYPE.length
  ? window.PAGE_TYPE
  : FALLBACK_PAGE_TYPE;
let activeAudienceFilter = 'Wszystkie';

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function sanitizeHref(href) {
  const trimmed = (href || '').trim();
  if (!trimmed) return '#';
  if (/^(https?:|mailto:|\/|#)/i.test(trimmed)) return trimmed;
  return '#';
}

function parseInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
    const safeHref = sanitizeHref(href);
    return `<a href="${safeHref}" target="_blank" rel="noopener noreferrer">${label}</a>`;
  });
  return html;
}

function renderMarkdown(markdown) {
  const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    const fenceMatch = line.match(/^\s*(```|~~~)(.*)$/);
    if (fenceMatch) {
      const fence = fenceMatch[1];
      const sameLine = line.match(/^\s*(```|~~~)([^\n]*?)\1\s*$/);
      if (sameLine) {
        out.push(`<pre><code>${escapeHtml(sameLine[2].trim())}</code></pre>`);
        i += 1;
        continue;
      }

      const code = [];
      i += 1;
      while (i < lines.length && !new RegExp(`^\\s*${fence}\\s*$`).test(lines[i])) {
        code.push(lines[i]);
        i += 1;
      }
      out.push(`<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`);
      if (i < lines.length) i += 1;
      continue;
    }

    if (/^\s*$/.test(line)) {
      i += 1;
      continue;
    }

    const heading = line.match(/^(#{1,4})\s+(.+)$/);
    if (heading) {
      const level = heading[1].length;
      out.push(`<h${level}>${parseInlineMarkdown(heading[2])}</h${level}>`);
      i += 1;
      continue;
    }

    if (/^\s*>\s?/.test(line)) {
      const quoteLines = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
        quoteLines.push(lines[i].replace(/^\s*>\s?/, ''));
        i += 1;
      }
      out.push(`<blockquote>${parseInlineMarkdown(quoteLines.join(' '))}</blockquote>`);
      continue;
    }

    if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        items.push(parseInlineMarkdown(lines[i].replace(/^\s*[-*+]\s+/, '')));
        i += 1;
      }
      out.push(`<ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>`);
      continue;
    }

    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items.push(parseInlineMarkdown(lines[i].replace(/^\s*\d+\.\s+/, '')));
        i += 1;
      }
      out.push(`<ol>${items.map(item => `<li>${item}</li>`).join('')}</ol>`);
      continue;
    }

    const paragraph = [line];
    i += 1;
    while (
      i < lines.length &&
      !/^\s*$/.test(lines[i]) &&
      !/^\s*```/.test(lines[i]) &&
      !/^(#{1,4})\s+/.test(lines[i]) &&
      !/^\s*>\s?/.test(lines[i]) &&
      !/^\s*[-*+]\s+/.test(lines[i]) &&
      !/^\s*\d+\.\s+/.test(lines[i])
    ) {
      paragraph.push(lines[i]);
      i += 1;
    }
    out.push(`<p>${parseInlineMarkdown(paragraph.join(' '))}</p>`);
  }

  return out.join('');
}

function updateDescriptionPreview(markdown) {
  const previewEl = document.getElementById('task-desc-preview');
  previewEl.innerHTML = renderMarkdown(markdown || '');
}

function insertPlainTextAtCursor(text) {
  const selection = window.getSelection();
  if (!selection || selection.rangeCount === 0) return;
  const range = selection.getRangeAt(0);
  range.deleteContents();
  const node = document.createTextNode(text);
  range.insertNode(node);
  range.setStartAfter(node);
  range.collapse(true);
  selection.removeAllRanges();
  selection.addRange(range);
}

function handlePlainTextPaste(event) {
  const text = (event.clipboardData || window.clipboardData).getData('text/plain');
  if (typeof text !== 'string') return;

  event.preventDefault();

  const target = event.target;
  if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement) {
    const start = target.selectionStart ?? target.value.length;
    const end = target.selectionEnd ?? target.value.length;
    target.setRangeText(text, start, end, 'end');
    target.dispatchEvent(new Event('input', { bubbles: true }));
    return;
  }

  insertPlainTextAtCursor(text);
  target.dispatchEvent(new Event('input', { bubbles: true }));
}

function getTaskRef(id = selectedTaskId) {
  return ref(db, `tasks/${id}`);
}

function normalizeTaskAudiences(task) {
  const source = Array.isArray(task?.audiences) ? task.audiences : [];
  const normalized = source.filter(a => PAGE_TYPE.includes(a));
  return [...new Set(normalized)];
}

function getChecklistItemStatus(item) {
  if (item && (item.status === 'todo' || item.status === 'doing' || item.status === 'done')) {
    return item.status;
  }
  return item && item.done ? 'done' : 'todo';
}

function normalizeChecklist(checklist) {
  if (!Array.isArray(checklist)) return [];
  return checklist.map(item => ({
    text: String(item?.text || ''),
    status: getChecklistItemStatus(item)
  }));
}

function normalizeComments(comments) {
  if (!Array.isArray(comments)) return [];
  return comments.map((comment, i) => ({
    id: String(comment?.id || `${comment?.createdAt || 'c'}_${i}`),
    text: String(comment?.text || ''),
    createdAt: Number(comment?.createdAt || 0),
    createdBy: String(comment?.createdBy || '')
  }));
}

function normalizeIssues(issues) {
  if (!Array.isArray(issues)) return [];
  return issues.map((issue, i) => ({
    id: String(issue?.id || `${issue?.createdAt || 'i'}_${i}`),
    text: String(issue?.text || ''),
    status: issue?.status === 'resolved' ? 'resolved' : 'open',
    createdAt: Number(issue?.createdAt || 0),
    createdBy: String(issue?.createdBy || '')
  }));
}

function formatDateTime(ts) {
  if (!ts) return '';
  const date = new Date(ts);
  return date.toLocaleString('pl-PL', {
    day: '2-digit',
    month: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function taskMatchesAudienceFilter(task) {
  if (activeAudienceFilter === 'Wszystkie') return true;
  const audiences = normalizeTaskAudiences(task);
  return audiences.includes(activeAudienceFilter);
}

function scheduleSaveTask(patch) {
  if (!selectedTaskId) return;
  const saveId = selectedTaskId;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => update(getTaskRef(saveId), patch), 600);
}

function getActiveChecklistInputIndex() {
  const active = document.activeElement;
  if (!(active instanceof HTMLInputElement) || !active.classList.contains('cl-text-input')) return -1;
  return Array.from(document.querySelectorAll('.cl-text-input')).indexOf(active);
}

function isEditingTaskSidebar() {
  const active = document.activeElement;
  if (!active) return false;
  if (active.id === 'task-title' || active.id === 'task-desc') return true;
  if (active instanceof HTMLInputElement && active.classList.contains('cl-text-input')) return true;
  if (active.id === 'comment-input' || active.id === 'issue-input') return true;
  return false;
}

function mergeEditingDraftIntoIncomingTasks(incomingTasks) {
  if (!selectedTaskId) return incomingTasks;

  const currentLocalTask = allTasks[selectedTaskId];
  const incomingTask = incomingTasks[selectedTaskId];
  if (!currentLocalTask || !incomingTask) return incomingTasks;

  const active = document.activeElement;
  const mergedTask = { ...incomingTask };

  if (active && active.id === 'task-title') mergedTask.title = currentLocalTask.title;
  if (active && active.id === 'task-desc') mergedTask.description = currentLocalTask.description;
  if (active instanceof HTMLInputElement && active.classList.contains('cl-text-input')) {
    mergedTask.checklist = currentLocalTask.checklist;
  }

  return {
    ...incomingTasks,
    [selectedTaskId]: mergedTask
  };
}

function openTaskSidebar(id) {
  if (!id || !allTasks[id]) return;
  selectedTaskId = id;
  commentDraft = '';
  issueDraft = '';
  renderBoard();
  renderTaskSidebar();
}

function closeTaskSidebar() {
  selectedTaskId = null;
  commentDraft = '';
  issueDraft = '';
  renderBoard();
  renderTaskSidebar();
}

function getMemberColor(id) {
  const m = TEAM_MEMBERS.find(m => m.id === id);
  return m ? m.color : '#555';
}
function getMemberInitials(id) {
  const m = TEAM_MEMBERS.find(m => m.id === id);
  return m ? m.initials : '?';
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  sections.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (s === activeSection ? ' active' : '');
    btn.textContent = s;
    btn.addEventListener('click', () => { activeSection = s; renderTabs(); renderBoard(); });
    tabsEl.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'tab tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'Dodaj sekcję';
  addBtn.addEventListener('click', () => document.getElementById('overlay-section').classList.add('open'));
  tabsEl.appendChild(addBtn);
}

function renderAudienceFilters() {
  const wrap = document.getElementById('audience-filters');
  const options = ['Wszystkie', ...PAGE_TYPE];
  wrap.innerHTML = '';

  options.forEach(option => {
    const btn = document.createElement('button');
    btn.className = 'aud-chip' + (option === activeAudienceFilter ? ' active' : '');
    btn.textContent = option;
    btn.addEventListener('click', () => {
      activeAudienceFilter = option;
      renderAudienceFilters();
      renderBoard();
      renderTaskSidebar();
    });
    wrap.appendChild(btn);
  });
}

function clearBoardDropTargets() {
  document.querySelectorAll('.col-cards.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function setBoardDropTarget(cardsEl) {
  if (!cardsEl) return;
  clearBoardDropTargets();
  cardsEl.classList.add('drag-over');
}

function initBoardDragAndDrop() {
  boardSortables.forEach(instance => instance.destroy());
  boardSortables = [];

  document.querySelectorAll('.col-cards').forEach(cardsEl => {
    const sortable = Sortable.create(cardsEl, {
      group: 'kanban-columns',
      animation: 160,
      easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)',
      draggable: '.card',
      sort: false,
      ghostClass: 'card-ghost',
      chosenClass: 'card-chosen',
      dragClass: 'card-dragging',
      onStart: evt => {
        setBoardDropTarget(evt.from);
      },
      onMove: evt => {
        if (!evt.to) return true;
        setBoardDropTarget(evt.to);
        return true;
      },
      onEnd: evt => {
        clearBoardDropTargets();

        const taskId = evt.item?.dataset.taskId;
        const fromCol = evt.from?.dataset.column;
        const toCol = evt.to?.dataset.column;

        if (!taskId || !toCol || !allTasks[taskId]) {
          renderBoard();
          return;
        }

        if (fromCol !== toCol) {
          allTasks[taskId].column = toCol;
          update(getTaskRef(taskId), { column: toCol });
        }

        renderBoard();
        if (selectedTaskId === taskId) renderTaskSidebar();
      }
    });

    boardSortables.push(sortable);
  });
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  if (selectedTaskId) {
    const picked = allTasks[selectedTaskId];
    if (!picked || picked.section !== activeSection || !taskMatchesAudienceFilter(picked)) selectedTaskId = null;
  }

  const sectionTasks = Object.entries(allTasks)
    .filter(([, t]) => t.section === activeSection)
    .filter(([, t]) => taskMatchesAudienceFilter(t))
    .map(([id, t]) => ({ id, ...t }));

  const audienceLabel = activeAudienceFilter === 'Wszystkie' ? 'wszystkie' : activeAudienceFilter;
  document.getElementById('task-count').textContent = `${activeSection} · ${sectionTasks.length} zadań · ${audienceLabel}`;

  COLUMNS.forEach(col => {
    const colTasks = sectionTasks.filter(t => t.column === col);
    const colEl = document.createElement('div');
    colEl.className = 'col';

    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col}</span>
        <span class="col-count">${colTasks.length}</span>
      </div>
      <div class="col-cards" id="col-${col.replace(/\s/g,'_')}"></div>
      <button class="add-card" data-col="${col}">+ dodaj zadanie</button>
    `;
    board.appendChild(colEl);

    const cardsEl = colEl.querySelector('.col-cards');
    cardsEl.dataset.column = col;

    colTasks.forEach(task => {
      const card = document.createElement('div');
      const isDone = col === 'Zrobione';
      const isIP   = col === 'W trakcie';
      card.className = 'card' + (isDone ? ' done' : '') + (isIP ? ' in-progress' : '');
      card.dataset.taskId = task.id;

      const priorityClass = { 'Wysoki': 'p-wysoki', 'Średni': 'p-sredni', 'Niski': 'p-niski' }[task.priority] || 'p-niski';
      const assignees = Array.isArray(task.assignees) ? task.assignees : [];
      const audiences = normalizeTaskAudiences(task);
      const checklist = normalizeChecklist(task.checklist);
      const doneCount = checklist.filter(c => c.status === 'done').length;
      const doingCount = checklist.filter(c => c.status === 'doing').length;
      const todoCount = checklist.length - doneCount - doingCount;
      const commentsCount = normalizeComments(task.comments).length;
      const openIssuesCount = normalizeIssues(task.issues).filter(issue => issue.status === 'open').length;

      let checklistStatsHTML = '';
      if (checklist.length > 0) {
        checklistStatsHTML = `
          <div class="checklist-stats">
            <span class="cl-stat todo">○ ${todoCount}</span>
            <span class="cl-stat doing">− ${doingCount}</span>
            <span class="cl-stat done">✓ ${doneCount}</span>
          </div>
        `;
      }

      card.innerHTML = `
        <div class="card-title">${task.title}</div>
        <div class="card-meta">
          ${task.priority ? `<span class="badge ${priorityClass}">${task.priority}</span>` : ''}
          ${audiences.map(name => `<span class="tag-badge">${name}</span>`).join('')}
          ${assignees.map(id => `<div class="av-sm" style="background:${getMemberColor(id)}22;color:${getMemberColor(id)}">${getMemberInitials(id)}</div>`).join('')}
          ${commentsCount > 0 ? `<span class="tag-badge">K: ${commentsCount}</span>` : ''}
          ${openIssuesCount > 0 ? `<span class="tag-badge">P: ${openIssuesCount}</span>` : ''}
          ${checklist.length > 0 ? `<span style="font-size:11px;color:var(--muted);margin-left:auto">${doneCount}/${checklist.length}</span>` : ''}
        </div>
        ${checklistStatsHTML}
      `;

      card.addEventListener('click', () => {
        openTaskSidebar(task.id);
      });
      if (task.id === selectedTaskId) card.classList.add('selected');
      cardsEl.appendChild(card);
    });

    colEl.querySelector('.add-card').addEventListener('click', () => {
      const newTask = {
        title: 'Nowe zadanie',
        section: activeSection,
        column: col,
        priority: 'Niski',
        description: '',
        audiences: [],
        assignees: [user.id],
        checklist: [],
        comments: [],
        issues: [],
        createdAt: Date.now(),
        createdBy: user.id
      };
      const taskRef = push(ref(db, 'tasks'), newTask);
      openTaskSidebar(taskRef.key);
    });
  });

  initBoardDragAndDrop();
}

function populateColumns(task) {
  const sel = document.getElementById('sel-column');
  sel.innerHTML = '';
  COLUMNS.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    if (c === task.column) opt.selected = true;
    sel.appendChild(opt);
  });
}

function populateSections(task) {
  const sel = document.getElementById('sel-section');
  sel.innerHTML = '';
  sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    if (s === task.section) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderAudienceTags(task) {
  const el = document.getElementById('audience-tags');
  el.innerHTML = '';
  const selectedAudiences = normalizeTaskAudiences(task);

  PAGE_TYPE.forEach(name => {
    const selected = selectedAudiences.includes(name);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tag-pill' + (selected ? ' selected' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      let next = normalizeTaskAudiences(allTasks[selectedTaskId]);
      if (next.includes(name)) next = next.filter(v => v !== name);
      else next.push(name);
      allTasks[selectedTaskId].audiences = next;
      update(getTaskRef(), { audiences: next });
      renderAudienceTags(allTasks[selectedTaskId]);
      renderBoard();
    });
    el.appendChild(btn);
  });
}

function renderAssignees(task) {
  const el = document.getElementById('assignees-list');
  el.innerHTML = '';
  TEAM_MEMBERS.forEach(m => {
    const selected = (task.assignees || []).includes(m.id);
    const av = document.createElement('div');
    av.className = 'av-member' + (selected ? ' selected' : ' unselected');
    av.title = m.name;
    av.textContent = m.initials;
    av.style.cssText = `background:${m.color}22;color:${m.color}`;
    av.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      let assignees = [...(allTasks[selectedTaskId].assignees || [])];
      if (selected) assignees = assignees.filter(id => id !== m.id);
      else assignees.push(m.id);
      allTasks[selectedTaskId].assignees = assignees;
      update(getTaskRef(), { assignees });
      renderAssignees(allTasks[selectedTaskId]);
      renderBoard();
    });
    el.appendChild(av);
  });
}

function updateProgress(task) {
  const cl = normalizeChecklist(task.checklist);
  const done = cl.filter(c => c.status === 'done').length;
  const wrap = document.getElementById('progress-wrap');
  const text = document.getElementById('progress-text');
  const fill = document.getElementById('progress-fill');
  if (cl.length === 0) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  text.textContent = `${done} / ${cl.length} punktów ukończonych`;
  fill.style.width = `${Math.round((done / cl.length) * 100)}%`;
}

function renderComments(task) {
  const list = document.getElementById('comments-list');
  list.innerHTML = '';

  const comments = normalizeComments(task.comments);
  if (comments.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-mini';
    empty.textContent = 'Brak komentarzy.';
    list.appendChild(empty);
    return;
  }

  comments.forEach((comment, i) => {
    const author = TEAM_MEMBERS.find(m => m.id === comment.createdBy);
    const item = document.createElement('div');
    item.className = 'comment-item';

    const head = document.createElement('div');
    head.className = 'comment-head';

    const left = document.createElement('div');
    left.className = 'comment-author';

    const avatar = document.createElement('span');
    avatar.className = 'comment-avatar';
    avatar.style.cssText = `background:${getMemberColor(comment.createdBy)}22;color:${getMemberColor(comment.createdBy)}`;
    avatar.textContent = getMemberInitials(comment.createdBy);

    const authorName = document.createElement('span');
    authorName.textContent = author ? author.name : 'Nieznany użytkownik';

    left.append(avatar, authorName);

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.alignItems = 'center';
    right.style.gap = '6px';

    const time = document.createElement('span');
    time.className = 'comment-time';
    time.textContent = formatDateTime(comment.createdAt);

    const del = document.createElement('button');
    del.className = 'btn-inline-danger';
    del.type = 'button';
    del.textContent = 'Usuń';
    del.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      allTasks[selectedTaskId].comments.splice(i, 1);
      update(getTaskRef(), { comments: allTasks[selectedTaskId].comments });
      renderComments(allTasks[selectedTaskId]);
      renderBoard();
    });

    right.append(time, del);
    head.append(left, right);

    const text = document.createElement('div');
    text.className = 'comment-text';
    text.textContent = comment.text;

    item.append(head, text);
    list.appendChild(item);
  });
}

function renderIssues(task) {
  const list = document.getElementById('issues-list');
  list.innerHTML = '';

  const issues = normalizeIssues(task.issues);
  if (issues.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-mini';
    empty.textContent = 'Brak zgłoszonych problemów.';
    list.appendChild(empty);
    return;
  }

  issues.forEach((issue, i) => {
    const item = document.createElement('div');
    item.className = 'issue-item';

    const head = document.createElement('div');
    head.className = 'issue-head';

    const left = document.createElement('div');
    left.className = 'issue-title';

    const status = document.createElement('span');
    status.className = `issue-status ${issue.status}`;
    status.textContent = issue.status === 'resolved' ? 'rozwiązany' : 'otwarty';

    const time = document.createElement('span');
    time.className = 'issue-time';
    time.textContent = formatDateTime(issue.createdAt);

    left.append(status, time);

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.alignItems = 'center';
    right.style.gap = '6px';

    const toggle = document.createElement('button');
    toggle.className = 'btn-inline-ghost';
    toggle.type = 'button';
    toggle.textContent = issue.status === 'resolved' ? 'Otwórz' : 'Rozwiąż';
    toggle.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      const current = allTasks[selectedTaskId].issues[i]?.status === 'resolved' ? 'resolved' : 'open';
      allTasks[selectedTaskId].issues[i].status = current === 'open' ? 'resolved' : 'open';
      update(getTaskRef(), { issues: allTasks[selectedTaskId].issues });
      renderIssues(allTasks[selectedTaskId]);
      renderBoard();
    });

    const del = document.createElement('button');
    del.className = 'btn-inline-danger';
    del.type = 'button';
    del.textContent = 'Usuń';
    del.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      allTasks[selectedTaskId].issues.splice(i, 1);
      update(getTaskRef(), { issues: allTasks[selectedTaskId].issues });
      renderIssues(allTasks[selectedTaskId]);
      renderBoard();
    });

    right.append(toggle, del);
    head.append(left, right);

    const text = document.createElement('div');
    text.className = 'issue-text';
    text.textContent = issue.text;

    item.append(head, text);
    list.appendChild(item);
  });
}

function renderChecklist(task) {
  const el = document.getElementById('checklist');
  el.innerHTML = '';

  const checklist = normalizeChecklist(task.checklist);

  checklist.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'cl-item';

    const check = document.createElement('button');
    check.type = 'button';
    check.className = `cl-check ${item.status}`;
    const nextLabel = item.status === 'todo'
      ? 'Ustaw status: w trakcie'
      : item.status === 'doing'
        ? 'Ustaw status: zakończone'
        : 'Ustaw status: niezaczęte';
    check.setAttribute('aria-label', nextLabel);
    check.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      const current = getChecklistItemStatus(allTasks[selectedTaskId].checklist[i]);
      const next = current === 'todo' ? 'doing' : current === 'doing' ? 'done' : 'todo';
      allTasks[selectedTaskId].checklist[i].status = next;
      update(getTaskRef(), { checklist: allTasks[selectedTaskId].checklist });
      renderChecklist(allTasks[selectedTaskId]);
      updateProgress(allTasks[selectedTaskId]);
      renderBoard();
    });

    const input = document.createElement('input');
    input.type = 'text';
    input.className = `cl-text-input ${item.status}`;
    input.value = item.text;
    input.addEventListener('input', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      allTasks[selectedTaskId].checklist[i].text = input.value;
      scheduleSaveTask({ checklist: allTasks[selectedTaskId].checklist });
      renderBoard();
    });
    input.addEventListener('blur', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      const normalized = input.value.trim();
      if (input.value !== normalized) input.value = normalized;
      if (allTasks[selectedTaskId].checklist[i].text !== normalized) {
        allTasks[selectedTaskId].checklist[i].text = normalized;
        update(getTaskRef(), { checklist: allTasks[selectedTaskId].checklist });
        renderBoard();
      }
    });
    input.addEventListener('keydown', e => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      if (e.key === 'Enter') {
        e.preventDefault();
        allTasks[selectedTaskId].checklist.splice(i + 1, 0, { text: '', status: 'todo' });
        update(getTaskRef(), { checklist: allTasks[selectedTaskId].checklist });
        renderChecklist(allTasks[selectedTaskId]);
        updateProgress(allTasks[selectedTaskId]);
        const items = document.querySelectorAll('.cl-text-input');
        if (items[i + 1]) items[i + 1].focus();
      }
      if (e.key === 'Backspace' && input.value === '' && allTasks[selectedTaskId].checklist.length > 1) {
        e.preventDefault();
        allTasks[selectedTaskId].checklist.splice(i, 1);
        update(getTaskRef(), { checklist: allTasks[selectedTaskId].checklist });
        renderChecklist(allTasks[selectedTaskId]);
        updateProgress(allTasks[selectedTaskId]);
        const items = document.querySelectorAll('.cl-text-input');
        const prev = items[i - 1];
        if (prev) {
          prev.focus();
          const len = prev.value.length;
          prev.setSelectionRange(len, len);
        }
      }
    });

    const del = document.createElement('button');
    del.className = 'cl-delete';
    del.textContent = '×';
    del.addEventListener('click', () => {
      if (!selectedTaskId || !allTasks[selectedTaskId]) return;
      allTasks[selectedTaskId].checklist.splice(i, 1);
      update(getTaskRef(), { checklist: allTasks[selectedTaskId].checklist });
      renderChecklist(allTasks[selectedTaskId]);
      updateProgress(allTasks[selectedTaskId]);
      renderBoard();
    });

    row.append(check, input, del);
    el.appendChild(row);
  });

  updateProgress(task);
}

function renderTaskSidebar() {
  const task = selectedTaskId ? allTasks[selectedTaskId] : null;
  const emptyEl = document.getElementById('task-empty');
  const contentEl = document.getElementById('task-content');

  if (!task) {
    emptyEl.style.display = 'flex';
    contentEl.classList.remove('open');
    return;
  }

  task.checklist = normalizeChecklist(task.checklist);
  if (!Array.isArray(task.assignees)) task.assignees = [];
  if (!Array.isArray(task.audiences)) task.audiences = [];
  task.comments = normalizeComments(task.comments);
  task.issues = normalizeIssues(task.issues);

  emptyEl.style.display = 'none';
  contentEl.classList.add('open');

  const titleEl = document.getElementById('task-title');
  const descEl = document.getElementById('task-desc');
  const isEditingTitle = document.activeElement === titleEl;
  const isEditingDesc = document.activeElement === descEl;

  if (!isEditingTitle && titleEl.textContent !== (task.title || '')) titleEl.textContent = task.title || '';
  if (!isEditingDesc && descEl.textContent !== (task.description || '')) descEl.textContent = task.description || '';
  updateDescriptionPreview(task.description || '');

  document.getElementById('sel-priority').value = task.priority || 'Niski';

  populateColumns(task);
  populateSections(task);
  renderAudienceTags(task);
  renderAssignees(task);
  renderChecklist(task);
  renderComments(task);
  renderIssues(task);

  const commentInput = document.getElementById('comment-input');
  const issueInput = document.getElementById('issue-input');
  if (document.activeElement !== commentInput) commentInput.value = commentDraft;
  if (document.activeElement !== issueInput) issueInput.value = issueDraft;

  const creator = TEAM_MEMBERS.find(m => m.id === task.createdBy);
  document.getElementById('created-info').innerHTML =
    `Utworzone przez <strong>${creator ? creator.name : 'kogoś'}</strong><br>${task.createdAt ? new Date(task.createdAt).toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' }) : ''}`;
}

document.getElementById('btn-new').addEventListener('click', () => {
  const newTask = {
    title: 'Nowe zadanie',
    section: activeSection,
    column: 'Backlog',
    priority: 'Niski',
    description: '',
    audiences: [],
    assignees: [user.id],
    checklist: [],
    comments: [],
    issues: [],
    createdAt: Date.now(),
    createdBy: user.id
  };
  const taskRef = push(ref(db, 'tasks'), newTask);
  openTaskSidebar(taskRef.key);
});

document.getElementById('btn-close-task').addEventListener('click', closeTaskSidebar);

const taskTitleEl = document.getElementById('task-title');
taskTitleEl.addEventListener('paste', handlePlainTextPaste);
taskTitleEl.addEventListener('input', () => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  allTasks[selectedTaskId].title = taskTitleEl.textContent.trim();
  scheduleSaveTask({ title: allTasks[selectedTaskId].title });
  renderBoard();
});
taskTitleEl.addEventListener('blur', () => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  const normalized = taskTitleEl.textContent.trim();
  if (taskTitleEl.textContent !== normalized) taskTitleEl.textContent = normalized;
  if (allTasks[selectedTaskId].title !== normalized) {
    allTasks[selectedTaskId].title = normalized;
    update(getTaskRef(), { title: normalized });
    renderBoard();
  }
});
taskTitleEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    taskTitleEl.blur();
  }
});

const taskDescEl = document.getElementById('task-desc');
taskDescEl.addEventListener('paste', handlePlainTextPaste);
taskDescEl.addEventListener('input', () => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  allTasks[selectedTaskId].description = taskDescEl.textContent;
  scheduleSaveTask({ description: allTasks[selectedTaskId].description });
  updateDescriptionPreview(allTasks[selectedTaskId].description);
});

document.getElementById('sel-column').addEventListener('change', e => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  allTasks[selectedTaskId].column = e.target.value;
  update(getTaskRef(), { column: allTasks[selectedTaskId].column });
  renderBoard();
});

document.getElementById('sel-priority').addEventListener('change', e => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  allTasks[selectedTaskId].priority = e.target.value;
  update(getTaskRef(), { priority: allTasks[selectedTaskId].priority });
  renderBoard();
});

document.getElementById('sel-section').addEventListener('change', e => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  allTasks[selectedTaskId].section = e.target.value;
  update(getTaskRef(), { section: allTasks[selectedTaskId].section });
  renderBoard();
  renderTaskSidebar();
});

document.getElementById('btn-add-cl').addEventListener('click', () => {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  allTasks[selectedTaskId].checklist.push({ text: '', status: 'todo' });
  update(getTaskRef(), { checklist: allTasks[selectedTaskId].checklist });
  renderChecklist(allTasks[selectedTaskId]);
  const inputs = document.querySelectorAll('.cl-text-input');
  if (inputs.length) inputs[inputs.length - 1].focus();
  renderBoard();
});

const commentInputEl = document.getElementById('comment-input');
const issueInputEl = document.getElementById('issue-input');

commentInputEl.addEventListener('input', () => {
  commentDraft = commentInputEl.value;
});

issueInputEl.addEventListener('input', () => {
  issueDraft = issueInputEl.value;
});

function addCommentToTask() {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  const text = commentInputEl.value.trim();
  if (!text) return;
  allTasks[selectedTaskId].comments = normalizeComments(allTasks[selectedTaskId].comments);
  allTasks[selectedTaskId].comments.push({
    id: `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    text,
    createdAt: Date.now(),
    createdBy: user.id
  });
  commentDraft = '';
  commentInputEl.value = '';
  update(getTaskRef(), { comments: allTasks[selectedTaskId].comments });
  renderComments(allTasks[selectedTaskId]);
  renderBoard();
}

function addIssueToTask() {
  if (!selectedTaskId || !allTasks[selectedTaskId]) return;
  const text = issueInputEl.value.trim();
  if (!text) return;
  allTasks[selectedTaskId].issues = normalizeIssues(allTasks[selectedTaskId].issues);
  allTasks[selectedTaskId].issues.push({
    id: `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
    text,
    status: 'open',
    createdAt: Date.now(),
    createdBy: user.id
  });
  issueDraft = '';
  issueInputEl.value = '';
  update(getTaskRef(), { issues: allTasks[selectedTaskId].issues });
  renderIssues(allTasks[selectedTaskId]);
  renderBoard();
}

document.getElementById('btn-add-comment').addEventListener('click', addCommentToTask);
document.getElementById('btn-add-issue').addEventListener('click', addIssueToTask);

commentInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addCommentToTask();
  }
});

issueInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addIssueToTask();
  }
});

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!selectedTaskId) return;
  if (confirm('Usunąć to zadanie na zawsze?')) {
    const deletingId = selectedTaskId;
    remove(getTaskRef(deletingId));
    selectedTaskId = null;
    renderBoard();
    renderTaskSidebar();
  }
});

document.getElementById('cancel-section').addEventListener('click', () => {
  document.getElementById('overlay-section').classList.remove('open');
  document.getElementById('new-section-input').value = '';
});
document.getElementById('confirm-section').addEventListener('click', async () => {
  const name = document.getElementById('new-section-input').value.trim();
  if (!name) return;
  const newSections = [...sections, name];
  await set(ref(db, 'sections'), newSections);
  document.getElementById('overlay-section').classList.remove('open');
  document.getElementById('new-section-input').value = '';
});

onValue(ref(db, 'sections'), snap => {
  const val = snap.val();
  sections = val || SECTIONS;
  if (!activeSection || !sections.includes(activeSection)) activeSection = sections[0];
  renderTabs();
  renderAudienceFilters();
  renderBoard();
  renderTaskSidebar();
});

onValue(ref(db, 'tasks'), snap => {
  const isEditing = isEditingTaskSidebar();
  const checklistIndex = getActiveChecklistInputIndex();
  const incomingTasks = snap.val() || {};

  allTasks = isEditing ? mergeEditingDraftIntoIncomingTasks(incomingTasks) : incomingTasks;
  if (selectedTaskId && !allTasks[selectedTaskId]) selectedTaskId = null;
  renderAudienceFilters();
  renderBoard();

  if (!isEditing) {
    renderTaskSidebar();
  } else if (checklistIndex >= 0) {
    const inputs = document.querySelectorAll('.cl-text-input');
    const target = inputs[checklistIndex];
    if (target) {
      const cursor = target.selectionStart ?? target.value.length;
      target.focus();
      target.setSelectionRange(cursor, cursor);
    }
  }

  document.getElementById('loading').classList.add('hide');
});
</script>
</body>
